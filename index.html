<!DOCTYPE html>
<html>
<head>
  <title>Para mi amor 💚</title>
  <style>
    body {
      margin: 0;
      font-family: Arial;
      color: white;
      text-align: center;
      background-image: url('https://i.ibb.co/My9CRGq9/1017321003340289276.jpg');
      background-size: cover;
      background-position: center;
      min-height: 100vh;
      padding: 30px;
    }
    .box {
      background: rgba(0,0,0,0.6);
      padding: 20px;
      border-radius: 15px;
      max-width: 700px;
      margin: auto;
    }
    button {
      padding: 15px 30px;
      font-size: 18px;
      background: green;
      color: white;
      border: none;
      cursor: pointer;
    }
    #carta {
      display: none;
      margin-top: 20px;
      text-align: left;
    }
  </style>
</head>
<body>

<iframe width="0" height="0"
src="https://www.youtube.com/embed/Zn37zIBGv5M?autoplay=1&loop=1&playlist=Zn37zIBGv5M"
allow="autoplay"></iframe>

<div class="box">
  <h1>💚 Te amo igual a como amo el Minecraft ⛏️❤️</h1>

  <button onclick="document.getElementById('carta').style.display='block'">
    Abrir cofre secreto 🎁
  </button>

  <div id="carta">
    <h2>💌 Carta para ti</h2>
    <p>
      Hi! te quiero decir algo importante, te amo, pero no un amor normal...
      porque algo que sí me gustaría pasar es una eternidad contigo ❤️
    </p>
  </div>
</div>

</body>
</html>
